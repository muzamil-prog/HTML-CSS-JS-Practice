<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <h1>Punjab University admission Form</h1>
     <div style="height: 430px; width: 450px;">
   
    <div style="float: left;">
        
    <form action="">
        <label for="">*CNIC/BFORM NO</label>
        <br>
        <input type="text" name="" id="" placeholder="_______ -________-__">
        <br>
        <br>
        <label for="">*Name</label>
        <br>
        <input type="text" placeholder="Your name here">
        <br>
        <br>
        <label for="">*Father Name</label>
        <br>
        <input type="text" placeholder="Your Father name here">
        
        <br>
        <br>
        <label for="">*Father/ Ocupation</label>
        <br>
        <input type="text" placeholder="Father Ocupation">
        
        <br>
        <br>
        <label for="">*Gender</label>
        <br>
        <input list="select" type="text" placeholder="Male or Female">
        <datalist id="select">
            <option value="Male"></option>
            <option value="Female"></option>
            
        </datalist>
        
        <br>
        <br>
        <label for="">*Relgion</label>
        <br>
        <input list="select" type="text" placeholder="selcet Relgion" >
        <datalist id="select">
            <option value="ISlam"></option>
            <option value="Hindu"></option>
        </datalist>
        
        <br>
        <br>
        <label for="">*Blood Group</label>
        <br>
        <input list="selecct" type="text" placeholder="select your blood">
        <datalist id="selecct">
            <option value="A+"></option>
             <option value="B+"></option>
             <option value="O+"></option>
             <option value="O-"></option>
             <option value="A-"></option>
             <option value="B-"></option>
             <option value="AB+"></option>
        </datalist>


    </div>
    <div style="float: right;">

        <label for="">*Rewrite Cinic-no / form-B no</label>
        <br>
        <input type="text" placeholder="_______-___________-__">
        <br>
        <br>
        <label for="">*PhotGraph</label>
        <br>
        <input type="text" placeholder="chose photo">
        <br>
        <br>
        <label for="">*Father CNIC</label>
        <br>
        <input type="text" placeholder="_______-____________-__">
        <br>
        <br>
        <label for="">*Family Monthly income</label>
        <br>
        <input type="text" placeholder="Father montly income">
        <br>
        <br>
         <label for="">*Date of Birth</label>
         <br>
         <input type="datetime-local" placeholder="__/__/__">
         <br>
         <br>
         <label for="">*Hafiz-e-Quran</label>
         <br>
         <input list="options"  type="text" placeholder="select option"> <datalist id="options">
            <option value="yes"></option>
            <option value="no"></option>
         </datalist>
         <br>
         <br>
         <label for="">*Martial Stats</label>
         <br>
         <input list="chose" type="text" placeholder="<---Select matrial stats--->">
         <datalist id="chose">
            <option value="Single"></option>
            <option value="Maried"></option>
         </datalist>



         
         
        
    </div>
    </div>
    <p style="color: red;">In case of Female Applicant contect no of Father can enterd in moblile no field</p>
    </form>
</body>
</html>
