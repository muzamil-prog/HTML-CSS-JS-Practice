<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Hello, world!</h1>
  <div class="container bg-info p-5">
    <div class="row">
        <div class="col-lg-6 bg-primary p-5">left side</div>
        <div class="col-lg-6 bg-warning p-5">
            <div class="row p-4 bg-danger">
        <div class="col-lg-6 bg-primary p-4 bg-info">one</div>
        <div class="col-lg-6 bg-primary p-4 bg-warning">two</div>
        <div class="col-lg-6 bg-primary p-4 bg-primary">one</div>
        <div class="col-lg-6 bg-primary p-4 bg-info">two</div>


            </div>
        </div>


    </div>
  </div>
  <div class="container bg-danger p-5">
    <div class="row">
        <div class="col-lg-6  bg-info p-5">
            <div class="row p-4 bg-danger  ">
        <div class="col-lg-6  p-4 bg-primary">one</div>
        <div class="col-lg-6  p-4 bg-warning">one</div>

        <div class="col-lg-6 p-4 bg-info">two</div>
        <div class="col-lg-6  p-4 bg-primary">two</div>


            </div>
        </div>
        <div class="col-lg-6 bg-primary p-5">left side</div>



    </div>
  </div>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
