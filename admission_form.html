<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Form</title>
</head>
<body>
    <h1>Student Admission Form</h1>
    <p>Please fill the form carefully. All required fields must be completed</p>
    <form action="">
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" placeholder="Enter your full name" required>
        <br>
        <br>
        <label for="fathername">Father Name:</label>
        <input type="text" placeholder="Enter father name" id="fathername" name="fahtername" required>
        <br>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" maxlength="10" required>
        <br>
        <br>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="03XX-XXXXXXX" required>
        <br>
        <br>
        <label for="cnix">CNIC:</label>
        <input type="text" id="cnix" name="cinx" placeholder="XXXX-XXXXXXXX-X">
        <br>
        <br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>
        <br>
        <br>
        <label for="age"> Age:</label>
        <input type="number" id="age" name="age"  min="10" max="60" required>
        <br>
        <br>
        <label for="">Gender:</label>
        <input type="radio" name="gender" value="male" required>Male
        <input type="radio" name="gender" value="female">Female
        <input type="radio" name="gender" value="other">Other
        <br>
        <br>
        <label for="">Select Course:</label> <br>
        <input type="checkbox" name="course" value="html" > HTML <br>
        <input type="checkbox" name="course" value="css"> Css <br>
        <input type="checkbox" name="course" value="javascript"> JavaScript
        <br>
        <input type="checkbox" name="course" value="php"> PHP
        <br>
        <br>
        <label for="city">Select City</label>
        <select name="city" id="city" required>
            <option value="">--Select City--</option>
            <option value="Karachi">Karachi</option>
            <option value="Lahore">Lahore</option>
            <option value="Islamabad">Islamabad</option>
            <option value="peshawar">Peshawar</option>
        </select>
        <br>
        <br>
        <label for="address">Adress:</label> <br>
        <textarea name="address" id="address" rows="4" cols="30" placeholder="Enter you complete address" required></textarea>
        <br>
        <br>
        <label for="institute">Institute Name:</label>
        <input type="text" id="institute" name="" value="Fichtech"  readonly>
        <br>
        <br>
        <label for="discount">Discount Code:</label>
        <input type="text" id="discount" name="discount" value="Not awailable" disabled>
        <br>
        <br>
        <label for="photo">Upload Your Photo:</label>
        <input type="file" name="photo" id="photo" >
        <br>
        <br>
        <label for="website">Postfollow Website:</label>
        <input type="url" id="website" name="website" placeholder="https://example.com" required>
        <br>
        <br>
        <button type="submit">Submit Form</button>
        <button type="reset">Clear Form</button>
    </form>
</body>
</html>
